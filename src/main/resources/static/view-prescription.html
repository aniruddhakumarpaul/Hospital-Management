<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Prescription | LifeCare AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #e9ecef; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .prescription-container { width: 100%; max-width: 500px; }
        .card { border: none; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #0061f2 0%, #00ba94 100%); color: white; padding: 30px; text-align: center; }
        .prescription-box { background: white; padding: 30px; }
    </style>
</head>
<body>

<div class="prescription-container px-3">
    <div id="loginSection" class="card p-4">
        <h3 class="text-center mb-4 fw-bold">Patient Access</h3>
        <p class="text-muted text-center small mb-4">Enter details to retrieve your secure prescription.</p>
        <div class="mb-3"><label>Record Number</label><input type="text" id="recordId" class="form-control" placeholder="PAT-XXXX"></div>
        <div class="mb-4"><label>Phone Number</label><input type="text" id="phone" class="form-control" placeholder="10 Digits"></div>
        <button class="btn btn-primary w-100 py-3" onclick="verifyAndRetrieve()">Retrieve</button>
        <div id="msg" class="mt-3 text-center text-danger small"></div>
    </div>

    <div id="receiptSection" class="card border-0" style="display: none;">
        <div class="card-header"><h4>LifeCare AI</h4><small>Official Digital Prescription</small></div>
        <div class="prescription-box" id="prescriptionContent"></div>
        <div class="card-footer bg-white text-center">
            <button class="btn btn-sm btn-link text-muted" onclick="location.reload()">Back</button>
            <a href="index.html" class="btn btn-sm btn-outline-primary rounded-pill ms-2">Home</a>
        </div>
    </div>
</div>

<script>
    async function verifyAndRetrieve() {
        const recordId = document.getElementById('recordId').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const response = await fetch(`/api/patients/search/${recordId}`);
        if (response.ok) {
            const p = await response.json();
            if (p.phoneNumber.includes(phone)) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('receiptSection').style.display = 'block';
                document.getElementById('prescriptionContent').innerHTML = `
                    <div class="mb-4 border-bottom pb-2"><strong>PATIENT:</strong> ${p.name}</div>
                    <div class="mb-4"><strong>DIAGNOSIS:</strong> <h5 class="text-danger fw-bold">${p.predictedDisease}</h5></div>
                    <div class="p-3 bg-light rounded-4 mb-4 border-start border-4 border-primary">
                        <small>PRESCRIPTION</small><div class="fw-bold fs-5">${p.prescription || "Pending..."}</div>
                    </div>
                `;
            } else { document.getElementById('msg').innerText = "❌ Incorrect phone."; }
        } else { document.getElementById('msg').innerText = "❌ Not found."; }
    }
</script>
</body>
</html>
